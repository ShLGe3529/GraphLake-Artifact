coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
# Lower memory caps to leave headroom on a 64 GB host
query.max-memory=30GB
query.max-memory-per-node=30GB
# Spill to disk if query memory exceeds the cap
spill-enabled=true
spiller-spill-path=/tmp/trino-spill
max-spill-per-node=100GB