# Root infrastructure: MinIO (S3-compatible lakehouse storage) + shared network.
# Compute engines (Spark, Trino, GraphLake, ...) live under systems/*/docker-compose.yml.

services:
  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_REGION_NAME: us-east-2
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    networks:
      lakehouse-net:
        aliases:
          - warehouse.minio
    volumes:
      - ./data/minio-data:/data
    ports:
      - "9001:9001"
      - "19000:9000"
    command: ["server", "/data", "--console-address", ":9001"]

  mc:
    image: minio/mc
    container_name: mc
    depends_on:
      - minio
    networks:
      - lakehouse-net
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-2
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set minio http://minio:9000 admin password; do
        echo 'waiting for minio...' && sleep 1;
      done;
      /usr/bin/mc mb minio/warehouse --ignore-existing;
      /usr/bin/mc policy set public minio/warehouse;
      tail -f /dev/null
      "

networks:
  lakehouse-net:
    name: lakehouse-net
    driver: bridge
